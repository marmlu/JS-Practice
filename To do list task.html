<!doctype html>
<html lang="en" class="h-full">
  <head>
          <meta charset="UTF-8" />
          <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
          />
          <title>Task Manager</title>
          <script src="https://cdn.tailwindcss.com"></script>
        </head>

        <body
          class="bg-slate-900 min-h-screen flex justify-center items-center p-6"
        >
          <section
            class="bg-white w-full max-w-6xl rounded-3xl shadow-2xl p-8 md:p-12"
          >
            <h1
              class="text-5xl font-extrabold text-center mb-10 text-slate-800 tracking-wide"
            >
              Task Manager
            </h1>


            <div class="flex flex-col md:flex-row gap-4 mb-8">
              <input
                id="taskInput"
                type="text"
                placeholder="Enter a task..."
                class="flex-1 p-4 rounded-2xl border border-gray-300 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-300"
              />
                <input
  id="dateInput"
  type="date"
  class="p-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-400"
/>
<select
  id="priorityInput"
  class="p-4 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-400"
>
<option value="" disabled selected>Priority</option>
  <option value="LOW">Low</option>
  <option value="MEDIUM">Medium</option>
  <option value="HIGH">High</option>
</select>
              <button
                id="addBtn"
                class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-8 py-4 rounded-2xl transition duration-300"
              >
                Add Task
              </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
              <div class="bg-blue-50 rounded-2xl p-4 text-center">
                <p class="text-sm text-gray-500">Remaining</p>
                <p id="taskCounter" class="text-2xl font-bold text-blue-600">
                  0
                </p>
              </div>

              <div class="bg-purple-50 rounded-2xl p-4 text-center">
                <p class="text-sm text-gray-500">Total</p>
                <p id="totalTasks" class="text-2xl font-bold text-purple-600">
                  0
                </p>
              </div>

              <div class="bg-green-50 rounded-2xl p-4 text-center">
                <p class="text-sm text-gray-500">Completed</p>
                <p
                  id="completedTasks"
                  class="text-2xl font-bold text-green-600"
                >
                  0
                </p>
              </div>

              <div class="bg-orange-50 rounded-2xl p-4 text-center">
                <p class="text-sm text-gray-500">Progress</p>
                <p id="progressText" class="text-2xl font-bold text-orange-600">
                  0%
                </p>
              </div>
            </div>

            <div class="flex flex-wrap gap-3 justify-center mb-8">
              <button
                id="allBtn"
                class="bg-slate-700 hover:bg-slate-600 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >
                All
              </button>

              <button
                id="activeBtn"
                class="bg-red-500 hover:bg-red-400 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >
                Active
              </button>

              <button
                id="completedBtn"
                class="bg-green-500 hover:bg-green-400 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >
                Completed
              </button>

              <button
                id="sortAZBtn"
                class="bg-purple-600 hover:bg-purple-500 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >
                Sort A-Z
              </button>

              <button
                id="sortZABtn"
                class="bg-purple-600 hover:bg-purple-500 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >
                Sort Z-A
              </button>
<button id="exportBtn" class="bg-orange-800 hover:bg-orange-700 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >
  Export Tasks
</button>
              <button
                id="clearCompletedBtn"
                class="bg-red-600 hover:bg-red-500 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >
                Clear Completed
            </button>
              <input
                id="searchInput"
                type="text"
                placeholder="Search tasks..."
                class="px-4 py-2 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
             <div class="flex flex-wrap gap-3 justify-center mb-8">
            <button id="highBtn" class="bg-red-600 hover:bg-red-500 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >High</button>

<button id="mediumBtn" class="bg-yellow-500 hover:bg-yellow-400 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >Medium</button>

<button id="lowBtn" class="bg-green-600 hover:bg-green-500 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >Low</button>
</div>
 <div class="flex flex-wrap gap-3 justify-center mb-8">
            <button id="highActiveBtn" class="bg-red-600 hover:bg-red-500 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >High Active Tasks</button>

<button id="mediumActiveBtn" class="bg-yellow-500 hover:bg-yellow-400 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >Medium Active Tasks</button>

<button id="lowActiveBtn" class="bg-green-600 hover:bg-green-500 text-white font-semibold px-4 py-2 rounded-xl transition duration-300"
              >Low Active Tasks</button>
</div>
            <ul
              id="taskList"
              class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"
            ></ul>
          </section>

          <script src="to do list.js"></script>
      
        </body>
      </html>
    </section>
  </body>
</html>
