<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do-List app</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="flex justify-center items-center">
    <input
      class="w-max focus:outline-none focus:ring-2 focus:ring-green-400 p-4 bg-gray-200 rounded-lg m-5"
      holder="Enter the task you want to do"
      type="text"
    />
    <button class="p-2 px-4 bg-green-500 rounded-xl hover:bg-green-300">
      Add
    </button>
    <ul class="task-list"></ul>
  </body>
</html>
