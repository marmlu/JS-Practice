<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List App</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 flex justify-center items-center min-h-screen p-4">
    <section class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-4xl">
      <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">
        To-Do List
      </h1>

      <div class="flex flex-col sm:flex-row items-center gap-4 mb-8">
        <input
          id="taskInput"
          type="text"
          placeholder="Enter a task..."
          class="w-full p-4 rounded-xl bg-gray-100 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400 transition duration-300"
        />

        <button
          id="addBtn"
          class="w-full sm:w-auto bg-green-500 hover:bg-green-400 text-white font-semibold px-6 py-4 rounded-xl transition duration-300"
        >
          Add
        </button>
      </div>
      <p id="taskCounter" class="text-center mb-4 font-bold">
        Remaining Tasks: 0
      </p>
      <p id="totalTasks" class="text-center mb-4 font-bold">Total Tasks: 0</p>
      <p id="completedTasks" class="text-center mb-4 font-bold">
        Completed Tasks: 0
      </p>
      <p id="progressText" class="text-center mb-4 font-bold">Progress: 0%</p>
      <div class="flex justify-center gap-4 mb-4">
        <button
          class="w-full sm:w-auto bg-blue-500 hover:bg-blue-400 text-white font-semibold px-2 py-2 rounded-xl transition duration-300"
          id="allBtn"
        >
          All
        </button>
        <button
          class="w-full sm:w-auto bg-red-500 hover:bg-red-400 text-white font-semibold px-2 py-2 rounded-xl transition duration-300"
          id="activeBtn"
        >
          Active
        </button>
        <button
          class="w-full sm:w-auto bg-green-500 hover:bg-green-400 text-white font-semibold px-2 py-2 rounded-xl transition duration-300"
          id="completedBtn"
        >
          Completed
        </button>
      </div>
      <button
        id="sortAZBtn"
        class="w-full my-4 mr-2 sm:w-auto bg-purple-500 hover:bg-purple-400 text-white font-semibold px-2 py-2 rounded-xl transition duration-300"
      >
        Sort A-Z
      </button>

      <button
        id="sortZABtn"
        class="w-full m-2 sm:w-auto bg-purple-500 hover:bg-purple-400 text-white font-semibold px-2 py-2 rounded-xl transition duration-300"
      >
        Sort Z-A
      </button>
      <button
        id="clearCompletedBtn"
        class="w-full sm:w-auto bg-red-500 hover:bg-red-400 text-white font-semibold px-2 py-2 rounded-xl transition duration-300 mb-4"
      >
        Clear Completed
      </button>
      <input
        id="searchInput"
        type="text"
        placeholder="Search tasks..."
        class="p-3 rounded-xl bg-gray-100 border border-gray-300 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-green-400 m-4 transition duration-300"
      />
      <ul
        id="taskList"
        class="task-list grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></ul>
    </section>
    <script src="to do list.js"></script>
  </body>
</html>
