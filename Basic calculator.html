<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Calculator</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      let expression = "";
      let historyList = [];
      function updateDisplay() {
        document.getElementById("display").value = expression;
      }
      function appendNumber(num) {
        expression += num;
        updateDisplay();
      }
      function appendOperator(op) {
        if (expression === "") return;

        let lastChar = expression[expression.length - 1];
        if ("+-*/%^".includes(lastChar)) {
          expression = expression.slice(0, -1);
        }

        expression += op;
        updateDisplay();
      }
      function appendDot() {
        let parts = expression.split(/[+\-*/%^()]/);
        let currentNumber = parts[parts.length - 1];
        if (currentNumber.includes(".")) return;
        if (currentNumber === "") {
          expression += "0.";
        } else {
          expression += ".";
        }

        updateDisplay();
      }

      function appendBracket(bra) {
        let lastChar = expression[expression.length - 1];

        let openCount = (expression.match(/\(/g) || []).length;
        let closeCount = (expression.match(/\)/g) || []).length;

        if (bra === "(") {
          if (!isNaN(lastChar) || lastChar === ")") {
            expression += "*(";
          } else {
            expression += "(";
          }
        }
        if (bra === ")") {
          if (openCount > closeCount && !"+-*/%^(".includes(lastChar)) {
            expression += ")";
          }
        }

        updateDisplay();
      }

      function percent() {
        let lastChar = expression[expression.length - 1];

        if (!isNaN(lastChar)) {
          expression += "%";
        }

        updateDisplay();
      }

      function power() {
        let lastChar = expression[expression.length - 1];

        if (!isNaN(lastChar) || lastChar === ")") {
          expression += "^";
        }

        updateDisplay();
      }

      function clearDisplay() {
        expression = "";
        updateDisplay();
      }

      function backSpace() {
        expression = expression.slice(0, -1);
        updateDisplay();
      }

      function updateHistoryUI() {
        const historyContainer = document.getElementById("history");

        historyContainer.innerHTML = "";

        historyList.forEach((item) => {
          let p = document.createElement("p");

          p.textContent = item;

          p.className = "cursor-pointer hover:bg-gray-200 p-1 rounded";

          p.onclick = () => {
            let parts = item.split("=");

            expression = parts[1];
            updateDisplay();
          };

          historyContainer.appendChild(p);
        });
      }

      function calculate() {
        try {
          let exp = expression;

          exp = exp.replace(/(\d+(\.\d+)?)%/g, "($1/100)");

          exp = exp.replace(/\^/g, "**");

          let result = eval(exp);

          let entry = expression + " = " + result;

          historyList.push(entry);

          if (historyList.length > 10) {
            historyList.shift();
          }

          updateHistoryUI();

          expression = result.toString();

          updateDisplay();
        } catch {
          expression = "";

          document.getElementById("display").value = "Error";
        }
      }

      document.addEventListener("keydown", function (event) {
        let key = event.key;

        if (!isNaN(key) && key !== " ") {
          appendNumber(key);
        } else if (["+", "-", "*", "/"].includes(key)) {
          appendOperator(key);
        } else if (key === ".") {
          appendDot();
        } else if (key === "Enter") {
          calculate();
        } else if (key === "Backspace") {
          backSpace();
        } else if (key === "Escape") {
          clearDisplay();
        } else if (key === "%") {
          percent();
        } else if (key === "^") {
          power();
        } else if (key === "(" || key === ")") {
          appendBracket(key);
        }
      });
    </script>
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <section class="bg-gray-800 p-5 rounded-2xl shadow-2xl w-full max-w-md">
      <input
        type="text"
        id="display"
        class="w-full text-right p-4 text-3xl rounded mb-4 bg-black text-white"
        disabled
      />
      <div class="grid grid-cols-4 gap-2">
        <!-- ROW 1 -->
        <button
          onclick="clearDisplay()"
          class="bg-red-500 hover:bg-red-600 text-white p-3 rounded"
        >
          C
        </button>

        <button
          onclick="backSpace()"
          class="bg-yellow-500 hover:bg-yellow-600 text-white p-3 rounded"
        >
          ⌫
        </button>

        <button
          onclick="appendBracket('(')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          (
        </button>

        <button
          onclick="appendBracket(')')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          )
        </button>
        <button
          onclick="appendNumber('7')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          7
        </button>

        <button
          onclick="appendNumber('8')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          8
        </button>

        <button
          onclick="appendNumber('9')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          9
        </button>

        <button
          onclick="appendOperator('/')"
          class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded"
        >
          /
        </button>
        <button
          onclick="appendNumber('4')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          4
        </button>

        <button
          onclick="appendNumber('5')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          5
        </button>

        <button
          onclick="appendNumber('6')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          6
        </button>

        <button
          onclick="appendOperator('*')"
          class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded"
        >
          *
        </button>
        <button
          onclick="appendNumber('1')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          1
        </button>

        <button
          onclick="appendNumber('2')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          2
        </button>

        <button
          onclick="appendNumber('3')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          3
        </button>

        <button
          onclick="appendOperator('-')"
          class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded"
        >
          -
        </button>
        <button
          onclick="percent()"
          class="bg-green-500 hover:bg-green-600 text-white p-3 rounded"
        >
          %
        </button>

        <button
          onclick="appendNumber('0')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          0
        </button>

        <button
          onclick="appendDot()"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded"
        >
          .
        </button>

        <button
          onclick="appendOperator('+')"
          class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded"
        >
          +
        </button>
        <button
          onclick="power()"
          class="bg-blue-500 hover:bg-blue-600 text-white p-3 rounded"
        >
          ^
        </button>

        <button
          onclick="calculate()"
          class="bg-green-600 hover:bg-green-700 text-white p-3 rounded col-span-3"
        >
          =
        </button>
      </div>
      <div
        id="history"
        class="mt-4 bg-white rounded p-2 max-h-40 overflow-y-auto text-sm"
      ></div>
    </section>
  </body>
</html>
