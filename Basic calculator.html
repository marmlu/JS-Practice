<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Calculator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>

    <script>
      let expression = "";
      let historyList = [];

      function updateDisplay() {
        document.getElementById("display").value = expression;
      }

      function appendNumber(num) {
        expression += num;
        updateDisplay();
      }

      function appendOperator(op) {
        if (expression === "") return;

        let lastChar = expression[expression.length - 1];

        if ("+-*/%^".includes(lastChar)) {
          expression = expression.slice(0, -1);
        }

        expression += op;
        updateDisplay();
      }

      function appendDot() {
        let parts = expression.split(/[+\-*/%^()]/);

        let currentNumber = parts[parts.length - 1];

        if (currentNumber.includes(".")) return;

        if (currentNumber === "") {
          expression += "0.";
        } else {
          expression += ".";
        }

        updateDisplay();
      }

      function appendBracket(bra) {
        let lastChar = expression[expression.length - 1];

        let openCount = (expression.match(/\(/g) || []).length;
        let closeCount = (expression.match(/\)/g) || []).length;

        if (bra === "(") {
          if (!isNaN(lastChar) || lastChar === ")") {
            expression += "*(";
          } else {
            expression += "(";
          }
        }

        if (bra === ")") {
          if (openCount > closeCount && !"+-*/%^(".includes(lastChar)) {
            expression += ")";
          }
        }

        updateDisplay();
      }

      function percent() {
        let lastChar = expression[expression.length - 1];

        if (!isNaN(lastChar) || lastChar === ")") {
          expression += "%";
        }

        updateDisplay();
      }

      function power() {
        let lastChar = expression[expression.length - 1];

        if (!isNaN(lastChar) || lastChar === ")") {
          expression += "^";
        }

        updateDisplay();
      }

      function clearDisplay() {
        expression = "";
        updateDisplay();
      }

      function backSpace() {
        expression = expression.slice(0, -1);
        updateDisplay();
      }

      function updateHistoryUI() {
        const historyContainer = document.getElementById("history");

        historyContainer.innerHTML = "";

        historyList.forEach((item) => {
          let p = document.createElement("p");

          p.textContent = item;

          p.className =
            "cursor-pointer hover:bg-gray-200 p-1 rounded transition-all duration-200";

          p.onclick = () => {
            let parts = item.split("=");

            expression = parts[1].trim();

            updateDisplay();
          };

          historyContainer.appendChild(p);
        });
      }
      function squareRoot() {
        try {
          if (expression === "") return;
          let result = eval(expression);
          if (result < 0) {
            document.getElementById("display").value = "Error";
            expression = "";
            return;
          }
          result = Math.sqrt(result);
          let entry = expression + " = " + result;

          historyList.push(entry);

          if (historyList.length > 10) {
            historyList.shift();
          }

          updateHistoryUI();
          expression = result.toString();
          updateDisplay();
        } catch {
          expression = "";
          document.getElementById("display").value = "Error";
        }
      }

      function calculate() {
        try {
          let exp = expression;
          let openCount = (exp.match(/\(/g) || []).length;
          let closeCount = (exp.match(/\)/g) || []).length;
          while (openCount > closeCount) {
            exp += ")";
            closeCount++;
          }
          exp = exp.replace(
            /(\d+(\.\d+)?)([+\-])(\d+(\.\d+)?)%/g,
            function (match, firstNum, d1, operator, percentNum) {
              return `${firstNum}${operator}(${firstNum}*${percentNum}/100)`;
            },
          );

          exp = exp.replace(/(\d+(\.\d+)?)%/g, "($1/100)");
          exp = exp.replace(/\^/g, "**");

          let result = eval(exp);

          let entry = expression + " = " + result;

          historyList.push(entry);

          if (historyList.length > 10) {
            historyList.shift();
          }

          updateHistoryUI();

          expression = result.toString();

          updateDisplay();
        } catch {
          expression = "";

          document.getElementById("display").value = "Error";
        }
      }

      document.addEventListener("keydown", function (event) {
        let key = event.key;

        if (!isNaN(key) && key !== " ") {
          appendNumber(key);
        } else if (["+", "-", "*", "/"].includes(key)) {
          appendOperator(key);
        } else if (key === ".") {
          appendDot();
        } else if (key === "Enter") {
          calculate();
        } else if (key === "Backspace") {
          backSpace();
        } else if (key === "Escape") {
          clearDisplay();
        } else if (key === "%") {
          percent();
        } else if (key === "^") {
          power();
        } else if (key === "(" || key === ")") {
          appendBracket(key);
        }
      });
      function toggleTheme() {
        document.documentElement.classList.toggle("dark");

        let btn = document.getElementById("themeBtn");

        if (document.documentElement.classList.contains("dark")) {
          btn.innerHTML = "☀️";
          localStorage.setItem("theme", "dark");
        } else {
          btn.innerHTML = "🌙";
          localStorage.setItem("theme", "light");
        }
      }

      window.onload = function () {
        let btn = document.getElementById("themeBtn");

        if (localStorage.getItem("theme") === "dark") {
          document.documentElement.classList.add("dark");
          btn.innerHTML = "☀️";
        } else {
          btn.innerHTML = "🌙";
        }
      };
    </script>
  </head>

  <body
    class="bg-white text-black dark:bg-gray-900 dark:text-white transition-all duration-300 min-h-screen flex justify-center items-center"
  >
    <button
      id="themeBtn"
      onclick="toggleTheme()"
      class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded active:scale-95 transition-all duration-150"
    >
      🌙
    </button>
    <section
      class="dark:bg-gray-800 text-black dark:text-white p-5 rounded-2xl shadow-2xl w-full max-w-md shadow-2xl bg-white/10 backdrop-blur-md border border-white/20"
    >
      <input
        type="text"
        id="display"
        class="w-full text-right p-4 text-3xl rounded mb-4 bg-black text-green-400 shadow-inner active:scale-95 transition-all duration-150"
        disabled
      />

      <div class="grid grid-cols-4 gap-2">
        <button
          onclick="clearDisplay()"
          class="bg-red-500 hover:bg-red-600 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          C
        </button>

        <button
          onclick="squareRoot()"
          class="bg-red-500 hover:bg-red-600 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          √
        </button>

        <button
          onclick="backSpace()"
          class="bg-yellow-500 hover:bg-yellow-600 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          ⌫
        </button>

        <button
          onclick="appendBracket('(')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          (
        </button>

        <button
          onclick="appendBracket(')')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          )
        </button>

        <button
          onclick="appendNumber('7')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          7
        </button>

        <button
          onclick="appendNumber('8')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          8
        </button>

        <button
          onclick="appendNumber('9')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          9
        </button>

        <button
          onclick="appendOperator('/')"
          class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          /
        </button>

        <button
          onclick="appendNumber('4')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          4
        </button>

        <button
          onclick="appendNumber('5')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          5
        </button>

        <button
          onclick="appendNumber('6')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          6
        </button>

        <button
          onclick="appendOperator('*')"
          class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          *
        </button>

        <button
          onclick="appendNumber('1')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          1
        </button>

        <button
          onclick="appendNumber('2')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          2
        </button>

        <button
          onclick="appendNumber('3')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          3
        </button>

        <button
          onclick="appendOperator('-')"
          class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          -
        </button>

        <button
          onclick="percent()"
          class="bg-green-500 hover:bg-green-600 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          %
        </button>

        <button
          onclick="appendNumber('0')"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          0
        </button>

        <button
          onclick="appendDot()"
          class="bg-gray-600 hover:bg-gray-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          .
        </button>

        <button
          onclick="appendOperator('+')"
          class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          +
        </button>
        <button
          onclick="power()"
          class="bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          ^
        </button>

        <button
          onclick="calculate()"
          class="bg-green-600 hover:bg-green-700 text-white p-3 rounded-2xl active:scale-95 transition-all duration-150"
        >
          =
        </button>
      </div>

      <div
        id="history"
        class="bg-gray-100 dark:bg-gray-700 text-black dark:text-black mt-4 rounded-2xl p-2 max-h-40 overflow-y-auto text-sm active:scale-95 transition-all duration-200 hover:translate-x-1"
      ></div>
    </section>
  </body>
</html>
