<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      let expression = "";
      let historyList = [];

      function updateDisplay() {
        document.getElementById("display").value = expression;
      }

      function appendNumber(num) {
        expression += num;
        updateDisplay();
      }

      function appendOperator(op) {
        if (expression === "") return;

        let lastChar = expression[expression.length - 1];

        if ("+-*/".includes(lastChar)) {
          expression = expression.slice(0, -1);
        }

        expression += op;
        updateDisplay();
      }

      function appendDot() {
        let parts = expression.split(/[+\-*/]/);
        let currentNumber = parts[parts.length - 1];
        if (currentNumber.includes(".")) return;
        if (currentNumber === "") {
          expression += "0.";
        } else {
          expression += ".";
        }

        updateDisplay();
      }

      function calculate() {
        try {
          const display = document.getElementById("display");
          let arr = expression.match(/\d+(\.\d+)?|[+\-*/]/g);

          if (!arr) return;
          arr = arr.map((item) => {
            return isNaN(item) ? item : Number(item);
          });
          for (let i = 0; i < arr.length; i++) {
            if (arr[i] === "*" || arr[i] === "/") {
              let result;

              if (arr[i] === "*") {
                result = arr[i - 1] * arr[i + 1];
              } else {
                result = arr[i - 1] / arr[i + 1];
              }

              arr.splice(i - 1, 3, result);
              i--;
            }
          }

          for (let i = 0; i < arr.length; i++) {
            if (arr[i] === "+" || arr[i] === "-") {
              let result;

              if (arr[i] === "+") {
                result = arr[i - 1] + arr[i + 1];
              } else {
                result = arr[i - 1] - arr[i + 1];
              }

              arr.splice(i - 1, 3, result);
              i--;
            }
          }
          let finalResult = arr[0];
          let entry = expression + "=" + finalResult;
          historyList.push(entry);

          expression = finalResult.toString();
          display.value = expression;

          updateHistoryUI();
        } catch {
          expression = "";
          document.getElementById("display").value = "Error";
        }
      }
      function clearDisplay() {
        expression = "";
        updateDisplay();
      }

      function backSpace() {
        expression = expression.slice(0, -1);
        updateDisplay();
      }
      function updateHistoryUI() {
        const historyContainer = document.getElementById("history");

        historyContainer.innerHTML = "";
        historyList.forEach((item) => {
          let p = document.createElement("p");
          p.textContent = item;
          p.style.cursor = "pointer";
          p.onclick = () => {
            let parts = item.split("=");
            expression = parts[1];
            document.getElementById("display").value = expression;
          };
          if (historyList.length > 10) {
            historyList.shift(); // remove oldest
          }

          historyContainer.appendChild(p);
        });
      }
      document.addEventListener("keydown", function (event) {
        const key = event.key;
        if (!isNaN(key) && key !== " ") {
          appendNumber(key);
        } else if (["+", "-", "*", "/"].includes(key)) {
          appendOperator(key);
        } else if (key === ".") {
          appendDot();
        } else if (key === "Enter") {
          calculate();
        } else if (key === "Backspace") {
          backSpace();
        } else if (key === "Escape") {
          clearDisplay();
        }
      });
    </script>
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <section class="bg-gray-400 p-4 rounded shadow-lg w-full max-w-sm">
      <input
        type="text"
        id="display"
        class="w-full text-right p-4 text-2xl border rounded mb-4 text-white bg-gray-800"
        disabled
      />

      <div class="grid grid-cols-4 gap-2">
        <button onclick="appendNumber('7')" class="btn bg-gray-600 text-white">
          7
        </button>
        <button onclick="appendNumber('8')" class="btn bg-gray-600 text-white">
          8
        </button>
        <button onclick="appendNumber('9')" class="btn bg-gray-600 text-white">
          9
        </button>
        <button
          onclick="appendOperator('/')"
          class="btn bg-orange-500 text-white"
        >
          /
        </button>

        <button onclick="appendNumber('4')" class="btn bg-gray-600 text-white">
          4
        </button>
        <button onclick="appendNumber('5')" class="btn bg-gray-600 text-white">
          5
        </button>
        <button onclick="appendNumber('6')" class="btn bg-gray-600 text-white">
          6
        </button>
        <button
          onclick="appendOperator('*')"
          class="btn bg-orange-500 text-white"
        >
          *
        </button>

        <button onclick="appendNumber('1')" class="btn bg-gray-600 text-white">
          1
        </button>
        <button onclick="appendNumber('2')" class="btn bg-gray-600 text-white">
          2
        </button>
        <button onclick="appendNumber('3')" class="btn bg-gray-600 text-white">
          3
        </button>
        <button
          onclick="appendOperator('-')"
          class="btn bg-orange-500 text-white"
        >
          -
        </button>

        <button
          onclick="appendNumber('0')"
          class="btn bg-gray-600 text-white col-span-2"
        >
          0
        </button>
        <button onclick="appendDot()" class="btn bg-gray-600 text-white">
          .
        </button>
        <button
          onclick="appendOperator('+')"
          class="btn bg-orange-500 text-white"
        >
          +
        </button>

        <button onclick="clearDisplay()" class="btn bg-red-500 text-white">
          C
        </button>

        <button onclick="backSpace()" class="btn bg-yellow-500 text-white">
          ⌫
        </button>
        <button onclick="calculate()" class="btn bg-green-500 text-white">
          =
        </button>
        <div
          id="history"
          class="mt-4 bg-white p-2 rounded max-h-40 overflow-y-auto text-sm"
        ></div>
      </div>
    </section>
  </body>
</html>
