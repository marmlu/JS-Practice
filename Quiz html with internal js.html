<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      let questions = [
        {
          question: "What is 2+2?",
          options: ["3", "4", "5"],
          answer: "4",
        },
        {
          question: "Capital of France?",
          options: ["Paris", "London", "Rome"],
          answer: "Paris",
        },
        {
          question: "Capital of Ethiopia?",
          options: ["Kenya", "Oromia", "Addis Ababa"],
          answer: "Addis Ababa",
        },
      ];

      let currentQuestionIndex = 0;
      let score = 0;
      let timer;
      let timeLeft = 10;

      function loadQuestion() {
        clearInterval(timer);

        const q = questions[currentQuestionIndex];
        const questionEl = document.getElementById("question");
        const buttons = document.querySelectorAll(".answer-btn");

        questionEl.textContent = q.question;

        buttons.forEach((btn, i) => {
          btn.textContent = q.options[i];
          btn.disabled = false;

          // RESET COLOR (BLUE)
          btn.style.backgroundColor = "#3b82f6";
        });

        startTimer();
      }

      function checkAnswer(event) {
        clearInterval(timer);

        const selected = event.target;
        const correct = questions[currentQuestionIndex].answer;
        const buttons = document.querySelectorAll(".answer-btn");

        // RESET ALL FIRST
        buttons.forEach((btn) => {
          btn.style.backgroundColor = "#3b82f6";
        });

        if (selected.textContent === correct) {
          selected.style.backgroundColor = "green";
          score++;
        } else {
          selected.style.backgroundColor = "red";

          // show correct answer
          buttons.forEach((btn) => {
            if (btn.textContent === correct) {
              btn.style.backgroundColor = "green";
            }
          });
        }

        // disable buttons
        buttons.forEach((btn) => (btn.disabled = true));

        setTimeout(() => {
          currentQuestionIndex++;

          if (currentQuestionIndex < questions.length) {
            loadQuestion();
          } else {
            showScore();
          }
        }, 1000);
      }

      function showScore() {
        clearInterval(timer);

        const container = document.getElementById("quiz");

        container.innerHTML = `
        <h2 class="text-xl font-bold mb-4 text-center">
          Your score: ${score} / ${questions.length}
        </h2>
        <button onclick="restartQuiz()"
          class="bg-green-500 text-white px-4 py-2 rounded">
          Restart Quiz
        </button>
      `;
      }

      function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;

        document.getElementById("quiz").innerHTML = `
        <h1 id="question" class="text-lg font-semibold text-center"></h1>
        <p id="timer" class="text-red-500 font-bold">10</p>

        <button class="answer-btn w-full py-2 rounded text-white"
          onclick="checkAnswer(event)"></button>

        <button class="answer-btn w-full py-2 rounded text-white"
          onclick="checkAnswer(event)"></button>

        <button class="answer-btn w-full py-2 rounded text-white"
          onclick="checkAnswer(event)"></button>
      `;

        loadQuestion();
      }

      function startTimer() {
        const timerEl = document.getElementById("timer");
        timeLeft = 10;
        timerEl.textContent = timeLeft;

        timer = setInterval(() => {
          timeLeft--;
          timerEl.textContent = timeLeft;

          if (timeLeft === 0) {
            clearInterval(timer);

            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
              loadQuestion();
            } else {
              showScore();
            }
          }
        }, 1000);
      }

      window.onload = loadQuestion;
    </script>
  </head>

  <body class="flex justify-center items-center h-screen bg-gray-100">
    <section class="bg-white max-w-md w-full p-6 rounded-2xl shadow-2xl">
      <div id="quiz" class="flex flex-col gap-4 items-center">
        <h1 id="question" class="text-lg font-semibold text-center"></h1>

        <p id="timer" class="text-red-500 font-bold">10</p>

        <button
          class="answer-btn w-full py-2 rounded text-white"
          onclick="checkAnswer(event)"
        ></button>

        <button
          class="answer-btn w-full py-2 rounded text-white"
          onclick="checkAnswer(event)"
        ></button>

        <button
          class="answer-btn w-full py-2 rounded text-white"
          onclick="checkAnswer(event)"
        ></button>
      </div>
    </section>
  </body>
</html>
