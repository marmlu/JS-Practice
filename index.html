<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      let questions = [
        {
          question: "What is 2+2?",
          options: ["3", "4", "5"],
          answer: "4",
        },
        {
          question: "Capital of France?",
          options: ["Paris", "London", "Rome"],
          answer: "Paris",
        },
        {
          question: "Capital of Ethiopia?",
          options: ["Kenya", "Oromia", "Addis Ababa"],
          answer: "Addis Ababa",
        },
      ];

      let currentQuestionIndex = 0;
      let score = 0;

      function loadQuestion() {
        const questionElement = document.querySelector("h1");
        const buttons = document.querySelectorAll("button");

        let currentQuestion = questions[currentQuestionIndex];

        questionElement.textContent = currentQuestion.question;

        buttons[0].textContent = currentQuestion.options[0];
        buttons[1].textContent = currentQuestion.options[1];
        buttons[2].textContent = currentQuestion.options[2];
      }
      function checkAnswer(event) {
        const buttons = document.querySelectorAll("button");

        let selectedAnswer = event.target.textContent;
        let correctAnswer = questions[currentQuestionIndex].answer;

        // Highlight
        if (selectedAnswer === correctAnswer) {
          event.target.style.backgroundColor = "green";
          score++;
        } else {
          event.target.style.backgroundColor = "red";
        }

        // Disable all buttons
        buttons.forEach((btn) => (btn.disabled = true));

        // Wait before moving to next question
        setTimeout(() => {
          currentQuestionIndex++;

          if (currentQuestionIndex < questions.length) {
            resetButtons();
            loadQuestion();
          } else {
            showScore();
          }
        }, 1000); // 1 second delay
      }
      function resetButtons() {
        const buttons = document.querySelectorAll("button");

        buttons.forEach((btn) => {
          btn.disabled = false;
          btn.style.backgroundColor = ""; // reset color
        });
      }

      function showScore() {
        const questionElement = document.querySelector("h1");
        const buttons = document.querySelectorAll("button");

        questionElement.textContent =
          "Your score is " + score + " / " + questions.length;

        buttons.forEach((btn) => (btn.style.display = "none"));
      }

      window.onload = loadQuestion;
    </script>
  </head>
  <body class="flex justify-center items-center h-screen w-full">
    <section class="bg-blue-100 max-w-md w-full p-4 rounded-xl shadow-xl">
      <div class="flex flex-col items-center">
        <h1 class="m-4 h">What is 2+2</h1>
        <button
          class="mx-4 my-2 bg-blue-500 rounded hover:bg-blue-300 p-1 w-full"
          id="b1"
          onclick="checkAnswer(event)"
        >
          4
        </button>
        <button
          class="mx-4 my-2 bg-blue-500 rounded hover:bg-blue-300 p-1 w-full"
          onclick="checkAnswer(event)"
        >
          3
        </button>
        <button
          class="mx-4 my-2 bg-blue-500 rounded hover:bg-blue-300 p-1 w-full"
          onclick="checkAnswer(event)"
        >
          9
        </button>
      </div>
    </section>
  </body>
</html>
